# Environment placeholders for optional services:
# AISSTREAM_API_KEY=replace-with-your-aisstream-api-key
# SPACETIMEDB_DB_NAME=replace-with-your-spacetimedb-db-name

services:
  proxy:
    image: traefik:v3.3
    container_name: proxy
    command:
      - --entrypoints.web.address=:80
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --accesslog=true
      - --log.level=DEBUG
    ports:
      - "80:80"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    restart: unless-stopped

  spacetimedb:
    image: clockworklabs/spacetime
    container_name: spacetimedb
    command: start
    expose:
      - "3000"
    volumes:
      - spacetimedb-data:/root/.local/share/spacetime/data
    restart: unless-stopped

  tileserver-gl:
    image: maptiler/tileserver-gl:v5.5.0
    container_name: tileserver-gl
    command: ["--verbose", "3", "--file", "/map_data/current.pmtiles"]
    ports:
      - "8080:8080"
    expose:
      - "8080"
    volumes:
      - ./map_data:/map_data
    restart: unless-stopped

  osm_pbf_processor:
    build:
      context: .
      dockerfile: osm_pbf_processor/Dockerfile
    image: flyaruu/harbor_osm_pbf_processor:latest
    container_name: osm_pbf_processor
    command: ["./osm_pbf_processor", "--config", "/app/osm_pbf_processor.toml", "--server"]
    depends_on:
      - tileserver-gl
    ports:
      - "8081:8081"
    expose:
      - 8081
    volumes:
      - ./osm_pbf_processor/osm_pbf_processor.compose.toml:/app/osm_pbf_processor.toml:ro
      - ./.cache:/.cache
    restart: unless-stopped

  location-source:
    build:
      context: .
      dockerfile: location-source/Dockerfile
    image: flyaruu/harbor_location_source:latest
    container_name: location-source
    depends_on:
      - spacetimedb
    environment:
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY}
      NO_CERT_VALIDATION: ${NO_CERT_VALIDATION:-true}
      SPACETIMEDB_HOST: http://spacetimedb:3000
      SPACETIMEDB_DB_NAME: ${SPACETIMEDB_DB_NAME:-ship-spacetime}
    restart: no

  harbor-wasm:
    build:
      context: .
      dockerfile: harbor/Dockerfile
    image: flyaruu/harbor_harbor_wasm:latest
    container_name: harbor-wasm
    depends_on:
      - spacetimedb
      - osm_pbf_processor
    environment:
      HARBOR_SPACETIMEDB_URI: ${HARBOR_SPACETIMEDB_URI-}
      HARBOR_SPACETIMEDB_MODULE: ${HARBOR_SPACETIMEDB_MODULE-}
      HARBOR_SPACETIMEDB_TOKEN: ${HARBOR_SPACETIMEDB_TOKEN-}
      HARBOR_TILE_SERVER_URI: ${HARBOR_TILE_SERVER_URI-}
    expose:
      - "1334"
    restart: unless-stopped

volumes:
  spacetimedb-data:

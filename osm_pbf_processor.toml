[conversion]
# Defaults to output/<zoom>/<x>_<y>.glb for URL tiles when omitted.
output = "harbor/assets/tiles/"

[server]
bind = "0.0.0.0"
port = 8081
backend = "http://localhost:8080"

[poi]
osm_pbf_path = "map_data/netherlands-latest.osm.pbf"

[conversion.simplify]
enabled = true
tolerance = 8.0

[conversion.land]
enabled = true
layer = "landcover"
blend_layers = ["landuse"]
fill_tile = true
clip_transportation = true
elevation = 0.0
xy_scale = 1.0
base_color = [0.45, 0.63, 0.34, 1.0]

[conversion.transportation]
enabled = true
layer = "transportation"
line_width = 6.0
elevation = 0.02
xy_scale = 1.0
base_color = [0.34, 0.34, 0.36, 1.0]
exclude_class = "ferry"

[conversion.building]
enabled = true
layer = "building"
default_height = 10.0
default_min_height = 0.0
height_scale = 2.8
xy_scale = 1.0
base_color = [0.72, 0.70, 0.66, 1.0]

[conversion.water]
enabled = true
layer = "water"
depth = 8.0
water_level = -6.0
xy_scale = 1.0
surface_color = [0.1, 0.35, 0.8, 0.55]
volume_color = [0.38, 0.33, 0.26, 1.0]
